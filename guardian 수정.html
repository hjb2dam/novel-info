<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>노벨 가디언 v10.1 - 버그 수정 완료</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #020617; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .ai-typing { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="text-slate-200 min-h-screen">

    <div class="max-w-[1600px] mx-auto px-6 py-8">
        <header class="flex justify-between items-center mb-10 p-6 glass rounded-3xl">
            <h1 class="text-3xl font-black text-emerald-400">GUARDIAN <span class="text-white font-light">PRO</span></h1>
            <div class="flex items-center gap-4">
                <span id="user-name" class="text-xs text-slate-500">게스트 모드 (로그인 미연결)</span>
                <button id="auth-btn" onclick="toggleAuth()" class="bg-indigo-600 px-6 py-2 rounded-xl text-sm font-bold">로그인 테스트</button>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-8">
            <aside class="col-span-12 lg:col-span-2 space-y-4">
                <button onclick="addProject()" class="w-full py-4 bg-emerald-600/20 text-emerald-400 border border-emerald-500/20 rounded-2xl font-bold">+ 새 프로젝트</button>
                <div id="project-list" class="space-y-1"></div>
            </aside>

            <main class="col-span-12 lg:col-span-4">
                <div class="glass p-8 rounded-[2rem] space-y-6">
                    <input type="text" id="proj-title" oninput="updateTitle()" class="bg-transparent text-2xl font-black text-white outline-none w-full" value="제목 없는 소설">
                    <textarea id="lore" oninput="autoSave()" class="w-full h-[600px] bg-transparent text-sm leading-relaxed outline-none resize-none text-slate-300" placeholder="설정을 입력하세요..."></textarea>
                    <button onclick="deleteProject()" class="text-[10px] text-slate-600 hover:text-rose-500">프로젝트 삭제</button>
                </div>
            </main>

            <section class="col-span-12 lg:col-span-6 space-y-6">
                <div class="flex gap-3 p-2 bg-slate-900 rounded-2xl">
                    <button onclick="switchTab('qa')" id="tab-qa" class="flex-1 py-3 rounded-xl bg-indigo-600 font-bold">Q&A</button>
                    <button onclick="switchTab('scan')" id="tab-scan" class="flex-1 py-3 rounded-xl hover:bg-slate-800 font-bold text-slate-500">모순 검사</button>
                </div>

                <div id="panel-qa" class="glass p-8 rounded-[2rem] min-h-[500px] space-y-6">
                    <div class="flex gap-2">
                        <input type="text" id="question" class="flex-1 p-4 bg-slate-950 rounded-xl border border-white/5 outline-none" placeholder="궁금한 점을 물어보세요.">
                        <button onclick="runAI('chat')" class="px-8 bg-indigo-600 rounded-xl font-bold">묻기</button>
                    </div>
                    <div id="result-qa" class="prose prose-invert max-w-none text-sm p-6 bg-slate-950/30 rounded-2xl min-h-[300px]"></div>
                </div>

                <div id="panel-scan" class="hidden glass p-8 rounded-[2rem] min-h-[500px] space-y-6">
                    <textarea id="manuscript" class="w-full h-80 p-6 bg-slate-950 rounded-2xl border border-white/5 outline-none" placeholder="원고를 입력하세요..."></textarea>
                    <button onclick="runAI('scan')" class="w-full py-4 bg-rose-600 rounded-xl font-bold">딥 스캔 시작</button>
                    <div id="result-scan" class="p-6 bg-slate-950/30 rounded-2xl min-h-[150px] text-rose-200"></div>
                </div>
            </section>
        </div>
    </div>

    <div class="fixed bottom-6 right-6 group">
        <div class="bg-slate-900 p-4 rounded-2xl border border-white/5 shadow-2xl opacity-0 group-hover:opacity-100 transition-all w-64 mb-2">
            <input type="password" id="apiKey" oninput="saveKey()" class="w-full p-2 bg-slate-800 rounded-lg text-xs outline-none" placeholder="Groq API Key 입력">
        </div>
        <button class="w-12 h-12 bg-slate-900 rounded-2xl border border-white/10 flex items-center justify-center">⚙️</button>
    </div>

    <script>
        // --- [1] 변수 및 초기화 (버그 수정됨) ---
        let projects = JSON.parse(localStorage.getItem('g_projects')) || [{id: Date.now(), title: "신도시 연대기", lore: ""}];
        let currentId = projects[0].id;

        // --- [2] 프로젝트 관리 함수 ---
        function renderProjects() {
            const list = document.getElementById('project-list');
            list.innerHTML = projects.map(p => `
                <div onclick="loadProject(${p.id})" class="p-4 rounded-xl cursor-pointer mb-1 text-sm ${p.id === currentId ? 'bg-indigo-600/20 text-indigo-400 border border-indigo-500/20' : 'text-slate-500 hover:bg-white/5'}">
                    ${p.title}
                </div>
            `).join('');
        }

        function loadProject(id) {
            currentId = id;
            const p = projects.find(x => x.id === id);
            document.getElementById('proj-title').value = p.title;
            document.getElementById('lore').value = p.lore;
            renderProjects();
        }

        function autoSave() {
            const p = projects.find(x => x.id === currentId);
            if(p) {
                p.lore = document.getElementById('lore').value;
                localStorage.setItem('g_projects', JSON.stringify(projects));
            }
        }

        function updateTitle() {
            const p = projects.find(x => x.id === currentId);
            if(p) {
                p.title = document.getElementById('proj-title').value;
                localStorage.setItem('g_projects', JSON.stringify(projects));
                renderProjects();
            }
        }

        function addProject() {
            const p = {id: Date.now(), title: "새로운 소설", lore: ""};
            projects.unshift(p);
            currentId = p.id;
            localStorage.setItem('g_projects', JSON.stringify(projects));
            loadProject(p.id);
        }

        function deleteProject() {
            if(projects.length <= 1) return;
            projects = projects.filter(x => x.id !== currentId);
            currentId = projects[0].id;
            localStorage.setItem('g_projects', JSON.stringify(projects));
            loadProject(currentId);
        }

        // --- [3] UI 및 AI ---
        function switchTab(tab) {
            document.getElementById('panel-qa').classList.toggle('hidden', tab !== 'qa');
            document.getElementById('panel-scan').classList.toggle('hidden', tab !== 'scan');
            const btns = {qa: document.getElementById('tab-qa'), scan: document.getElementById('tab-scan')};
            btns.qa.className = tab === 'qa' ? "flex-1 py-3 rounded-xl bg-indigo-600 font-bold" : "flex-1 py-3 rounded-xl hover:bg-slate-800 font-bold text-slate-500";
            btns.scan.className = tab === 'scan' ? "flex-1 py-3 rounded-xl bg-rose-600 font-bold" : "flex-1 py-3 rounded-xl hover:bg-slate-800 font-bold text-slate-500";
        }

        async function runAI(mode) {
            const key = document.getElementById('apiKey').value.trim();
            const lore = document.getElementById('lore').value;
            const resDiv = mode === 'scan' ? document.getElementById('result-scan') : document.getElementById('result-qa');
            if(!key) return alert("우측 하단 ⚙️ 아이콘을 눌러 API 키를 입력하세요!");

            let prompt = "";
            if(mode === 'chat') prompt = `[설정]\n${lore}\n\n질문: ${document.getElementById('question').value}`;
            else if(mode === 'scan') prompt = `[설정]\n${lore}\n\n[원고]\n${document.getElementById('manuscript').value}\n\n설정 모순을 찾으세요.`;

            resDiv.innerHTML = "<div class='ai-typing text-indigo-400 py-10 text-center'>가디언 분석 중...</div>";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "system", content: "노벨 가디언입니다. Markdown으로 답하세요."}, {role: "user", content: prompt}],
                        temperature: 0.2
                    })
                });
                const data = await response.json();
                resDiv.innerHTML = marked.parse(data.choices[0].message.content);
            } catch (err) { resDiv.innerText = "Error: " + err.message; }
        }

        function toggleAuth() { alert("Supabase 설정 전까지는 로컬 저장소(LocalStorage)를 사용합니다!"); }
        function saveKey() { localStorage.setItem('groq_api_key', document.getElementById('apiKey').value); }
        
        window.onload = () => {
            const k = localStorage.getItem('groq_api_key');
            if(k) document.getElementById('apiKey').value = k;
            renderProjects();
            loadProject(currentId);
        };
    </script>
</body>
</html>
